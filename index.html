<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" href="./favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Credit Card Approval Prediction System</title>

    <meta
      name="description"
      content="Predict Credit Card Eligibility in Seconds Using Machine Learning"
    />

    <meta property="og:title" content="AI Credit Card Approval Prediction System" />
    <meta
      property="og:description"
      content="Predict Credit Card Eligibility in Seconds Using Machine Learning"
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // GitHub Pages SPA redirect handler — decodes ?p= set by 404.html
      (function () {
        var search = window.location.search;
        if (search.indexOf('p=') === -1) return;
        var params = search.slice(1).split('&');
        var path = '';
        var query = '';
        for (var i = 0; i < params.length; i++) {
          if (params[i].indexOf('p=') === 0) {
            path = '/' + params[i].slice(2).replace(/~and~/g, '&');
          } else if (params[i].indexOf('q=') === 0) {
            query = '?' + params[i].slice(2).replace(/~and~/g, '&');
          }
        }
        if (path) {
          window.history.replaceState(
            null, null,
            '/aicreditcardapproval' + path + query + window.location.hash
          );
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
