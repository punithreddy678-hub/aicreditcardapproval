<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Credit Card Approval</title>
    <script>
      // GitHub Pages SPA redirect: encodes the sub-path as ?p= and redirects to index.html
      // segmentCount = 1 because the repo lives at /aicreditcardapproval/
      var segmentCount = 1;
      var l = window.location;
      var base = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
      var rest = l.pathname.slice(1).split('/').slice(segmentCount).join('/');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + rest.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
